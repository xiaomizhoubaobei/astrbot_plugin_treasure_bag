name: Release Build

# 触发条件：推送到 main 分支时触发或手动触发
on:
  push:
    branches:
      - main
    paths:
      - '**/*.py'
  workflow_dispatch:  # 允许手动触发

permissions:
  contents: read

jobs:
  build:
    name: Build Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write  # 必需的签名权限

    steps:
      # 0. 安全加固
      - name: 加固运行器
        uses: step-security/harden-runner@c6295a65d1254861815972266d5933fd6e532bdf # v2.11.1
        with:
          egress-policy: audit

      # 1. 检出代码
      - name: 检出代码
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0  # 获取完整的 git 历史

      # 2. 设置 Python 环境
      - name: 设置 Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.12'

      # 3. 获取版本号和插件名称
      - name: 获取版本号和插件名称
        id: get_info
        run: |
          # 从 metadata.yaml 文件中读取版本号
          VERSION=$(grep "^version:" metadata.yaml | awk '{print $2}')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag_name=$VERSION" >> $GITHUB_OUTPUT
          # 从 metadata.yaml 文件中读取插件名称
          PLUGIN_NAME=$(grep "^name:" metadata.yaml | awk '{print $2}')
          echo "plugin_name=$PLUGIN_NAME" >> $GITHUB_OUTPUT

      # 4. 安装依赖
      - name: 安装依赖
        run: |
          pip install -r requirements.txt

      # 5. 创建插件目录
      - name: 创建插件目录
        run: |
          PLUGIN_NAME=${{ steps.get_info.outputs.plugin_name }}
          mkdir -p "$PLUGIN_NAME"

      # 6. 复制插件文件到构建目录
      - name: 复制插件文件
        run: |
          PLUGIN_NAME=${{ steps.get_info.outputs.plugin_name }}
          # 复制主程序文件
          cp main.py "$PLUGIN_NAME"/
          # 复制配置文件和依赖文件
          cp metadata.yaml requirements.txt "$PLUGIN_NAME"/ || true
          # 复制所有处理器文件
          cp handlers/*.py "$PLUGIN_NAME"/handlers/ || true
          # 复制工具函数
          cp utils/*.py "$PLUGIN_NAME"/utils/ || true
          # 复制百度相关功能
          cp baidu/*.py "$PLUGIN_NAME"/baidu/ || true
          # 复制配置相关文件
          cp config/*.py "$PLUGIN_NAME"/config/ || true
          # 复制 logo 文件
          cp logo.png "$PLUGIN_NAME"/ || true

      # 7. 打包为 zip 文件
      - name: 创建 zip 包
        run: |
          PLUGIN_NAME=${{ steps.get_info.outputs.plugin_name }}
          zip -r "$PLUGIN_NAME".zip "$PLUGIN_NAME"/

      # 8. 生成 Release Notes
      - name: Generate Release Notes
        id: release_notes
        run: |
          # 从上一个标签生成 Release Notes
          PREVIOUS_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          VERSION=${{ steps.get_info.outputs.version }}

          # 定义生成更新日志的函数
          generate_changelog_from_git() {
            local PREVIOUS_TAG=$1
            local VERSION=$2

            # 初始化分类
            local FEAT=""
            local FIX=""
            local REFACTOR=""
            local DOCS=""
            local TEST=""
            local STYLE=""
            local CHORE=""
            local PERF=""
            local CI=""
            local BUILD=""
            local OTHER=""

            # 遍历所有 commit
            while IFS= read -r commit; do
              # 提取 commit 类型和消息
              type=$(echo "$commit" | sed -n 's/^\([a-z]*\):.*/\1/p')
              msg=$(echo "$commit" | sed 's/^[a-z]*: *//')

              # 按类型分类
              case "$type" in
                feat)    FEAT="${FEAT}- ${msg}\n" ;;
                fix)     FIX="${FIX}- ${msg}\n" ;;
                refactor) REFACTOR="${REFACTOR}- ${msg}\n" ;;
                docs)    DOCS="${DOCS}- ${msg}\n" ;;
                test)    TEST="${TEST}- ${msg}\n" ;;
                style)   STYLE="${STYLE}- ${msg}\n" ;;
                chore)   CHORE="${CHORE}- ${msg}\n" ;;
                perf)    PERF="${PERF}- ${msg}\n" ;;
                ci)      CI="${CI}- ${msg}\n" ;;
                build)   BUILD="${BUILD}- ${msg}\n" ;;
                *)       OTHER="${OTHER}- ${msg}\n" ;;
              esac
            done < <(git log ${PREVIOUS_TAG}..HEAD --pretty=format:"%s" --no-merges)

            # 构建更新日志
            NOTES="## 📦 Release v${VERSION}\n\n"

            # 添加各个分类
            if [ -n "$FEAT" ]; then
              NOTES="${NOTES}### ✨ 新功能\n\n${FEAT}\n"
            fi

            if [ -n "$FIX" ]; then
              NOTES="${NOTES}### 🐛 修复\n\n${FIX}\n"
            fi

            if [ -n "$PERF" ]; then
              NOTES="${NOTES}### ⚡ 性能优化\n\n${PERF}\n"
            fi

            if [ -n "$REFACTOR" ]; then
              NOTES="${NOTES}### ♻️ 重构\n\n${REFACTOR}\n"
            fi

            if [ -n "$DOCS" ]; then
              NOTES="${NOTES}### 📝 文档\n\n${DOCS}\n"
            fi

            if [ -n "$TEST" ]; then
              NOTES="${NOTES}### ✅ 测试\n\n${TEST}\n"
            fi

            if [ -n "$STYLE" ]; then
              NOTES="${NOTES}### 💄 样式\n\n${STYLE}\n"
            fi

            if [ -n "$CI" ]; then
              NOTES="${NOTES}### 👷 CI\n\n${CI}\n"
            fi

            if [ -n "$BUILD" ]; then
              NOTES="${NOTES}### 📦 构建\n\n${BUILD}\n"
            fi

            if [ -n "$CHORE" ]; then
              NOTES="${NOTES}### 🔧 杂项\n\n${CHORE}\n"
            fi

            if [ -n "$OTHER" ]; then
              NOTES="${NOTES}### 其他\n\n${OTHER}\n"
            fi

            # 如果没有任何提交
            if [ "$NOTES" = "## 📦 Release v${VERSION}\n\n" ]; then
              NOTES="${NOTES}无更新内容\n"
            fi

            echo -e "$NOTES"
          }

          if [ -z "$PREVIOUS_TAG" ]; then
            # 首次发布
            NOTES="## 🎉 首次发布 v${VERSION}\n\n这是宝藏袋插件(treasure_bag_plugin)的首次正式发布。\n\n### 功能特性\n\n- 一言: 获取随机一句话\n- 颜值评分: 发送人像图片获取来自百度的颜值评分\n- 王者荣耀: 查询王者荣耀英雄资料\n- 手写体生成: 生成手写样式的图片\n- 随机美女图片: 获取一张随机美女图片\n- 伤感语录: 获取一条伤感语录\n- 星座运势: 查询星座运势\n- 天气查询: 查询指定城市的天气\n\n### 使用方法\n\n请参考项目 README.md 了解详细使用方法。"
          else
            # 检查是否存在 CHANGELOG.md
            if [ -f "CHANGELOG.md" ]; then
              # 从 CHANGELOG.md 提取当前版本的更新内容
              CHANGELOG_CONTENT=$(awk -v version="\\[${VERSION}\\]" '$0 ~ version {found=1} found {print} found && /^## / && !($0 ~ version) {exit}' CHANGELOG.md | tail -n +2)

              if [ -n "$CHANGELOG_CONTENT" ]; then
                NOTES="## 📦 Release v${VERSION}\n\n${CHANGELOG_CONTENT}"
              else
                # CHANGELOG 中没有找到当前版本，从 git log 生成
                NOTES=$(generate_changelog_from_git "$PREVIOUS_TAG" "$VERSION")
              fi
            else
              # 从 git log 生成更新日志
              NOTES=$(generate_changelog_from_git "$PREVIOUS_TAG" "$VERSION")
            fi
          fi

          # 添加发布说明
          RELEASE_FOOTER="\n\n---\n\n### 📥 安装方法\n\n\`\`\`bash\n# 下载插件包后，将其放入 AstrBot 的 plugins 目录\n"

          NOTES="${NOTES}${RELEASE_FOOTER}"

          # 保存到文件
          echo -e "$NOTES" > release_notes.md

          # 输出到环境变量
          {
            echo 'notes<<EOF'
            cat release_notes.md
            echo EOF
          } >> $GITHUB_OUTPUT

      # 9. 生成证据包
      - name: 生成证据包
        if: always()  # 即使构建失败也运行
        uses: OrygnsCode/ci-evidence-pack@8222d7b3b015ce2f72222215bdf9966773036ab1 # main
        with:
          sign: 'true'

      # 10. 创建 GitHub Release
      - name: Create Release
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2.5.0
        with:
          tag_name: ${{ steps.get_info.outputs.tag_name }}
          name: Release ${{ steps.get_info.outputs.version }}
          body: |
            ${{ steps.release_notes.outputs.notes }}

            ---

            ## 📦 证据包说明

            本 Release 包含以下文件：

            - **${{ steps.get_info.outputs.plugin_name }}-*.zip**: 插件安装包
            - **evidence-bundle.tar.gz**: CI 证据包（包含源代码、Git 元数据、依赖项、SBOM 等）
            - **evidence-bundle.tar.gz.sig**: 证据包的 Sigstore 签名
            - **evidence-bundle.tar.gz.crt**: 证据包的签名证书

            证据包用于合规性审计和构建验证，可以使用以下命令验证：

            ```bash
            ci-evidence-pack verify evidence-bundle.tar.gz
            ```
          draft: false
          prerelease: false
          files: |
            ${{ steps.get_info.outputs.plugin_name }}.zip
            _evidence_dist/*.tar.gz
            _evidence_dist/*.sig
            _evidence_dist/*.crt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
